# Rebuild docs/index.html on every push to main and publish to GitHub Pages.
# After the first run, enable Pages once in the repo settings:
#   Settings -> Pages -> Source: "GitHub Actions"
name: Deploy interactive site

on:
  push:
    branches: [main]
    paths:
      - "dorks.yaml"
      - "dorkator/templates/static_site.html.j2"
      - "dorkator/exporters.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:  # allow manual rebuild from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dorkator
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build the static site
        run: dorkator --static-site docs/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
